<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returnalyzer - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .stat-card {
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-12">

    <div class="max-w-7xl mx-auto pt-12 px-6">
        <h1 class="text-4xl font-black tracking-tighter text-slate-800 uppercase mb-8">
            RETURN<span class="text-blue-600">ALYZER</span> <span class="text-slate-400 font-light">SYSTEM
                OVERVIEW</span>
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="bg-slate-900 rounded-3xl p-10 shadow-2xl border-b-8 border-green-500">
                <p class="text-green-400 text-xs uppercase tracking-[0.2em] font-bold mb-2">Total Disposed (Status 14+)
                </p>
                <h2 id="disposed-val" class="text-white text-6xl font-black tracking-tight">$0.00</h2>
            </div>
            <div class="bg-white rounded-3xl p-10 shadow-xl border border-slate-200 border-b-8 border-blue-600">
                <p class="text-blue-600 text-xs uppercase tracking-[0.2em] font-bold mb-2">Total Pending (Status <
                        14)</p>
                        <h2 id="pending-val" class="text-slate-800 text-6xl font-black tracking-tight">$0.00</h2>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-10">
            <span
                class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-3 border-r border-slate-100 mr-2">Case Class Filter:
            </span>

            <button onclick="setGlobalClass('ALL')" id="btn-class-all"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white">ALL</button>
            <button onclick="setGlobalClass('JS')" id="btn-class-js"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:bg-slate-100">JS</button>
            <button onclick="setGlobalClass('JD')" id="btn-class-jd"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:bg-slate-100">JD</button>
            <button onclick="setGlobalClass('STD')" id="btn-class-std"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:bg-slate-100">STD</button>
            <button onclick="setGlobalClass('LDH')" id="btn-class-ldh"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:bg-slate-100">LDH</button>
            <button onclick="setGlobalClass('TST')" id="btn-class-tst"
                class="class-filter-btn px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:bg-slate-100">TST</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

            <div>
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight">Cases by Status</h3>
                    <span id="case-total" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-xs font-bold">0
                        TOTAL</span>
                </div>
                <div id="case-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-xl font-bold text-slate-800 uppercase tracking-tight">Defendants by Status</h3>
                    <span id="def-total" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-xs font-bold">0
                        TOTAL</span>
                </div>
                <div id="def-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                </div>
            </div>

        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
            <div
                class="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest mr-2">Quick Jump:</span>

                    <a href="/cases"
                        class="px-4 py-2 bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 text-xs font-bold rounded-lg transition-all flex items-center gap-2">
                        <span class="opacity-50">[C]</span> CASES
                    </a>

                    <a href="/defendants"
                        class="px-4 py-2 bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 text-xs font-bold rounded-lg transition-all flex items-center gap-2">
                        <span class="opacity-50">[D]</span> DEFENDANTS
                    </a>

                    <a href="/drivers"
                        class="px-4 py-2 bg-slate-50 hover:bg-slate-800 hover:text-white text-slate-700 text-xs font-bold rounded-lg transition-all flex items-center gap-2">
                        <span class="opacity-50">[V]</span> DRIVERS
                    </a>
                </div>

                <div class="text-[10px] text-slate-400 italic">
                    Press the bracketed key to jump instantly
                </div>
            </div>
        </div>
    </div>

    <script src="/static/dashboard.js"></script>
</body>

</html>
