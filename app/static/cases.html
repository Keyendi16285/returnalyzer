<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cases - Returnalyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/cases.js" defer></script>
</head>
<body class="bg-gray-100 p-6 md:p-12 text-gray-900">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-8 rounded-lg shadow-md border-b-4 border-blue-600">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-slate-800">
                    RETURN<span class="text-blue-600">ALYZER</span>
                </h1>
                <p class="text-slate-500 font-medium mt-1">MassFOIA Case Analytics & Returns</p>
            </div>
            <div class="text-right">
                <div id="case-count" class="text-2xl font-bold text-slate-800">0</div>
                <div class="text-xs uppercase tracking-widest text-slate-400 font-bold">Total Cases</div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase font-bold tracking-wider">
                            <th class="p-4">ID</th>
                            <th class="p-4">Case Name</th>
                            <th class="p-4">Case Number</th>
                            <th class="p-4">Litigation Status</th>
                            <th class="p-4">Location</th>
                            <th class="p-4">Class</th>
                            <th class="p-4">Type</th>
                        </tr>
                    </thead>
                    <tbody id="cases-table-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-slate-400 animate-pulse">
                                Initializing Returnalyzer Engine...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
